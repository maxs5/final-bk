<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Запись в клинику</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page-bg">
    <main class="shell">
      <div class="mock-window">
        <div class="mock-top">
          <span></span><span></span><span></span>
        </div>
        <div class="mock-body">
          <section class="card form-card">
            <h1>Запись к врачу</h1>
            <p class="muted">Оставьте заявку, и оператор свяжется с вами в ближайшее время.</p>

            <form id="requestForm" novalidate>
              <label class="field-label" for="fullName">
                <span class="icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" role="img">
                    <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.87 0-7 2-7 4.5V20h14v-1.5C19 16 15.87 14 12 14Z"></path>
                  </svg>
                </span>
                ФИО
              </label>
              <input id="fullName" name="fullName" type="text" placeholder="Иванов Иван Иванович" required minlength="3" maxlength="120" />
              <p class="error" data-error-for="fullName"></p>

              <label class="field-label" for="phone">
                <span class="icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" role="img">
                    <path d="M6.6 10.8a13.4 13.4 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11.4 11.4 0 0 0 3.6.6 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 4 6a1 1 0 0 1 1-1h3.2a1 1 0 0 1 1 1 11.4 11.4 0 0 0 .6 3.6 1 1 0 0 1-.24 1Z"></path>
                  </svg>
                </span>
                Номер телефона
              </label>
              <input id="phone" name="phone" type="tel" placeholder="+7 (___) ___-__-__" required />
              <p class="error" data-error-for="phone"></p>

              <label class="field-label" for="problem">
                <span class="icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" role="img">
                    <path d="M4 4h16v12H7.5L4 19.5V4Zm4 4h8v2H8Zm0 4h6v2H8Z"></path>
                  </svg>
                </span>
                Опишите вашу проблему
              </label>
              <textarea id="problem" name="problem" rows="4" placeholder="Кратко опишите симптомы или вопрос"></textarea>
              <p class="error" data-error-for="problem"></p>

              <button id="submitBtn" type="submit">Отправить</button>
              <p id="formMessage" class="message"></p>
            </form>

            <div class="nav-links">
              <a class="link-btn secondary" href="/login">Вход оператора</a>
              <a class="link-btn" href="/admin">Заявки</a>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/config.js"></script>
    <script src="/static/form.js"></script>
  </body>
</html>
